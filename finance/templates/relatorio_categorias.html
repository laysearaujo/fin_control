{% extends 'base.html' %}

{% block content %}
<div class="row mb-4">
    <div class="col-12 text-center">
        <h2 class="fw-bold">🍕 Onde estou gastando?</h2>
        <p class="text-muted">Visão acumulada de <strong>{{ mes }}/{{ ano }}</strong> (Cartão + Débito)</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-custom p-4 shadow-sm">
            <canvas id="graficoPizza"></canvas>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="card card-custom p-4 shadow-sm h-100">
            <h5 class="fw-bold mb-3">Detalhes</h5>
            <ul class="list-group list-group-flush" id="lista-detalhes">
                </ul>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const categorias = {{ labels|safe }};
    const valores = {{ data|safe }};
    
    // Lista de 14 cores únicas e modernas
    const paletaCores = [
        '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#C9CBCF', 
        '#2ECC71', '#E74C3C', '#34495E', '#1ABC9C', '#9B59B6', '#E67E22', '#16A085'
    ];

    // Calcula o total geral para podermos descobrir a porcentagem no tooltip
    const totalGeral = valores.reduce((a, b) => a + b, 0);

    // Cria a lista lateral aplicando a cor correspondente do gráfico no badge de valor
    const listaDetalhes = document.getElementById('lista-detalhes');
    categorias.forEach((label, index) => {
        const valor = valores[index] !== undefined ? valores[index] : 0;
        const corDaCategoria = paletaCores[index % paletaCores.length]; // Evita estourar o array se houverem muitas categorias
        
        const li = document.createElement('li');
        li.className = 'list-group-item d-flex justify-content-between align-items-center fw-semibold text-secondary';
        li.innerHTML = `
            <span>${label}</span>
            <span class="badge rounded-pill text-white" style="background-color: ${corDaCategoria}; font-size: 0.9rem;">
                R$ ${valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
            </span>
        `;
        listaDetalhes.appendChild(li);
    });

    // Configuração do Gráfico
    const ctx = document.getElementById('graficoPizza');
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: categorias,
            datasets: [{
                data: valores,
                backgroundColor: paletaCores,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: false // Usamos a nossa própria lista estilizada ao lado
                },
                tooltip: {
                    callbacks: {
                        // Customiza o que aparece ao passar o mouse na fatia do gráfico
                        label: function(context) {
                            const valorAtual = context.parsed;
                            const porcentagem = totalGeral > 0 ? ((valorAtual / totalGeral) * 100).toFixed(1) : 0;
                            return ` R$ ${valorAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 })} (${porcentagem}%)`;
                        }
                    }
                }
            }
        }
    });
</script>
{% endblock %}
