{% extends 'base.html' %}

{% block content %}

<div class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body d-flex justify-content-between align-items-center py-2 px-3">
        <a href="{{ mes_ant_url }}" class="btn btn-light rounded-circle border" title="Mês Anterior" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
            <span class="fs-5">&laquo;</span>
        </a>
        
        <div class="text-center d-flex flex-column align-items-center">
            <h3 class="fw-bold m-0 text-capitalize text-dark">{{ data_ref|date:"F Y" }}</h3>
            <span class="badge rounded-pill bg-dark fw-normal mt-1 px-3">Análise de Gastos por Categoria</span>
        </div>
        
        <a href="{{ prox_mes_url }}" class="btn btn-light rounded-circle border" title="Próximo Mês" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
            <span class="fs-5">&raquo;</span>
        </a>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-custom p-4 shadow-sm">
            <canvas id="graficoPizza" style="cursor: pointer;"></canvas>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="card card-custom p-4 shadow-sm h-100">
            <div class="d-flex justify-content-between align-items-start mb-3 border-bottom pb-2">
                <h5 class="fw-bold m-0">Detalhes</h5>
                <div class="text-end">
                    <!-- O Total Geral (Tudo o que está no gráfico) -->
                    <span class="text-dark small fw-bold d-block" id="total-detalhes"></span>
                    <!-- O Custo Real calculado (Sem os aportes) -->
                    <span class="text-secondary fw-semibold d-block" style="font-size: 0.8rem;">
                        Custo Real de Vida: R$ {{ custo_mensal_real|floatformat:2 }}
                    </span>
                </div>
            </div>
            <ul class="list-group list-group-flush" id="lista-detalhes">
                </ul>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const categorias = {{ labels|safe }};
    const valores = {{ data|safe }};
    const idsCategorias = {{ ids_categorias|safe }}; // IDs recebidos da view
    const mes = "{{ mes }}";
    const ano = "{{ ano }}";
    
    const paletaCores = [
        '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#C9CBCF', 
        '#2ECC71', '#E74C3C', '#34495E', '#1ABC9C', '#9B59B6', '#E67E22', '#16A085'
    ];

    const totalGeral = valores.reduce((a, b) => a + b, 0);
    document.getElementById('total-detalhes').innerText = `Total: R$ ${totalGeral.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

    // Cria a lista lateral com links clicáveis para abrir o detalhamento
    const listaDetalhes = document.getElementById('lista-detalhes');
    categorias.forEach((label, index) => {
        const valor = valores[index] !== undefined ? valores[index] : 0;
        const corDaCategoria = paletaCores[index % paletaCores.length];
        const catId = idsCategorias[index];
        
        const li = document.createElement('li');
        li.className = 'list-group-item d-flex justify-content-between align-items-center fw-semibold text-secondary';
        
        // Se a categoria tiver um ID válido, criamos um link de redirecionamento
        if (catId) {
            li.innerHTML = `
                <a href="/relatorios/categorias/detalhes/${catId}/?mes=${mes}&ano=${ano}" class="text-decoration-none text-secondary hover-link">
                    <span>📁 ${label}</span>
                </a>
                <span class="badge rounded-pill text-white" style="background-color: ${corDaCategoria}; font-size: 0.9rem;">
                    R$ ${valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                </span>
            `;
        } else {
            li.innerHTML = `
                <span>${label}</span>
                <span class="badge rounded-pill text-white" style="background-color: ${corDaCategoria}; font-size: 0.9rem;">
                    R$ ${valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                </span>
            `;
        }
        listaDetalhes.appendChild(li);
    });

    const ctx = document.getElementById('graficoPizza');
    const meuGrafico = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: categorias,
            datasets: [{
                data: valores,
                backgroundColor: paletaCores,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const valorAtual = context.parsed;
                            const porcentagem = totalGeral > 0 ? ((valorAtual / totalGeral) * 100).toFixed(1) : 0;
                            return ` R$ ${valorAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 })} (${porcentagem}%)`;
                        }
                    }
                }
            },
            // AÇÃO AO CLICAR NA FATIA DO GRÁFICO:
            onClick: (evt, activeElements) => {
                if (activeElements.length > 0) {
                    const firstPoint = activeElements[0];
                    const index = firstPoint.index;
                    const catId = idsCategorias[index];
                    if (catId) {
                        window.location.href = `/relatorios/categorias/detalhes/${catId}/?mes=${mes}&ano=${ano}`;
                    }
                }
            }
        }
    });
</script>

<style>
    .hover-link:hover {
        color: #000 !important;
        text-decoration: underline !important;
    }
</style>
{% endblock %}
